<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberHub | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="barberstyle.css">
</head>
<body class="admin-body">

<!-- LOGIN SCREEN -->
<div id="login-screen">
    <div class="admin-login-box">
        <h1>BarberHub</h1>
        <p class="admin-login-sub">Admin Portal</p>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="admin-password" placeholder="Enter admin password">
        </div>
        <div id="login-error" class="admin-error">Incorrect password. Please try again.</div>
        <button class="btn" onclick="adminLogin()">Enter Dashboard</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

    <nav class="admin-nav">
        <div class="admin-nav-brand">
            <span class="admin-nav-title">BarberHub</span>
            <span class="admin-nav-sep">&mdash;</span>
            <span class="admin-nav-sub">Admin Dashboard</span>
        </div>
        <div class="admin-nav-right">
            <span id="admin-today-label"></span>
            <button class="admin-logout-btn" onclick="adminLogout()">Logout</button>
        </div>
    </nav>

    <!-- STATS -->
    <div class="admin-stats-row">
        <div class="admin-stat">
            <div class="admin-stat-label">Total Bookings</div>
            <div class="admin-stat-val" id="stat-total">0</div>
        </div>
        <div class="admin-stat">
            <div class="admin-stat-label">Today's Bookings</div>
            <div class="admin-stat-val" id="stat-today">0</div>
        </div>
        <div class="admin-stat">
            <div class="admin-stat-label">This Week</div>
            <div class="admin-stat-val" id="stat-week">0</div>
        </div>
    </div>

    <!-- FILTERS -->
    <div class="admin-filters">
        <div class="input-group admin-filter-group">
            <label>Filter by Date</label>
            <input type="date" id="filter-date" oninput="renderTable()">
        </div>
        <div class="input-group admin-filter-group">
            <label>Filter by Time</label>
            <select id="filter-time" onchange="renderTable()">
                <option value="">All Times</option>
                <option>09:00 AM</option>
                <option>10:00 AM</option>
                <option>11:00 AM</option>
                <option>01:00 PM</option>
                <option>02:00 PM</option>
                <option>03:00 PM</option>
                <option>04:00 PM</option>
                <option>05:00 PM</option>
            </select>
        </div>
        <div class="input-group admin-filter-group">
            <label>Filter by Service</label>
            <select id="filter-service" onchange="renderTable()">
                <option value="">All Services</option>
                <option>Haircut</option>
                <option>Fade</option>
                <option>Trim</option>
                <option>Shave</option>
            </select>
        </div>
        <button class="admin-clear-btn" onclick="clearFilters()">Clear Filters</button>
    </div>

    <!-- TABLE -->
    <div class="admin-table-wrap">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Service</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="booking-tbody"></tbody>
        </table>
        <div id="admin-empty" class="admin-empty" style="display:none;">No bookings found for the selected filters.</div>
    </div>

</div>

<script src="barberadminscript.js"></script>

</body>
</html>
